<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jewel 3D App</title>
  //fonts.googleapis.com">
  //fonts.gstatic.com" crossorigin>
  //fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  >

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>
  <script type="module" src="script.js"></script>
</head>
<body>
  <div class="app-shell">
    <header class="top-header">
      <div class="brand">Glass Jewel UI</div>
      <div class="header-actions">
        <button class="chip active" data-view="home">Home</button>
        <button class="chip" data-view="media">Media</button>
        <button class="chip" data-view="settings">Settings</button>
      </div>
    </header>

    <main class="layout">
      <section class="stage-panel">
        <div class="hero-stage" id="hero3d"></div>
      </section>

      <aside class="ui-panel">
        <div class="screen-card">
          <div class="screen-title" id="screenTitle">Home</div>
          <div class="screen-text" id="screenText">Navigation active. The 3D object is shown in the left panel.</div>
        </div>

        <div class="nav-grid">
          <button class="nav-btn active" data-view="home">⌂ Home</button>
          <button class="nav-btn" data-view="media">◔ Media</button>
          <button class="nav-btn" data-view="settings">⚙ Settings</button>
          <button class="nav-btn" id="enterBtn">＋ Action</button>
        </div>

        <div class="bottom-bar">
          <button class="bottom-btn active" data-view="home"><span class="jewel jewel-xs"></span></button>
          <button class="bottom-btn" data-view="media"><span class="jewel jewel-xs"></span></button>
          <button class="bottom-btn" data-view="settings"><span class="jewel jewel-xs"></span></button>
        </div>
      </aside>
    </main>
  </div>
</body>
</html>
